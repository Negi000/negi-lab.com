    </div>
  </main>
  <script>
    function getSafeTargetUrl() {
      const params = new URLSearchParams(location.search);
      const raw = params.get('url');
      if (!raw) return null;
      try {
        const target = new URL(raw, location.origin);
        const allowed = target.hostname === 'negi-lab.com' || target.hostname === 'gamewiki.jp' || target.hostname.endsWith('.gamewiki.jp');
        if ((target.protocol === 'https:' || target.protocol === 'http:') && allowed) return target;
      } catch (_) {}
      return null;
    }
    const targetUrl = getSafeTargetUrl();
    if(targetUrl) {
      document.getElementById('skipLink').href = targetUrl.href;
      setTimeout(function() {
        window.location.replace(targetUrl.href);
      }, 800);
    } else {
      document.getElementById('redirectNotice').textContent = '安全に遷移できるURLが指定されていません。';
      document.getElementById('skipLink').style.display = 'none';
    }
  </script>
